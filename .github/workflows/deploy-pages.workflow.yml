name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: gbajs3
          sparse-checkout-cone-mode: false

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './gbajs3/package-lock.json'

      - name: Install dependencies
        working-directory: ./gbajs3
        run: npm ci

      - name: Build
        working-directory: ./gbajs3
        run: npm run build:with-coi-serviceworker
        env:
          VITE_GBA_RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          GITHUB_PAGES: 'true'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./gbajs3/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
